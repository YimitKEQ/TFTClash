name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}

      - name: Check build output exists
        run: test -d dist && test -f dist/index.html

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  brace-balance:
    name: JSX Brace Balance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check App.jsx brace balance
        run: |
          BALANCE=$(python3 -c "
          c = open('src/App.jsx', encoding='utf-8').read()
          print(c.count('{') - c.count('}'))
          ")
          echo "Brace balance: $BALANCE"
          if [ "$BALANCE" != "0" ]; then
            echo "❌ BRACE IMBALANCE DETECTED: $BALANCE"
            exit 1
          fi
          echo "✅ Brace balance is 0"
