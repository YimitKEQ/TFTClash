<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1080px;background:#f0c46d}
.bg{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,#ffe9ba 0%,#f0c46d 50%,#c48528 100%)}
.dots{position:absolute;inset:0;background-image:radial-gradient(#1a0b2e 2px,transparent 2.5px);background-size:22px 22px;opacity:.2}
.rays{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:1500px;height:1500px;
  background:conic-gradient(from 0deg,#ff2626 0deg 10deg,transparent 10deg 26deg,#ff2626 26deg 36deg,transparent 36deg 52deg,#ff2626 52deg 62deg,transparent 62deg 78deg,#ff2626 78deg 88deg,transparent 88deg 104deg,#ff2626 104deg 114deg,transparent 114deg 130deg,#ff2626 130deg 140deg,transparent 140deg 156deg,#ff2626 156deg 166deg,transparent 166deg 182deg,#ff2626 182deg 192deg,transparent 192deg 208deg,#ff2626 208deg 218deg,transparent 218deg 234deg,#ff2626 234deg 244deg,transparent 244deg 260deg,#ff2626 260deg 270deg,transparent 270deg 286deg,#ff2626 286deg 296deg,transparent 296deg 312deg,#ff2626 312deg 322deg,transparent 322deg 338deg,#ff2626 338deg 348deg,transparent 348deg 360deg);
  opacity:.16;mask-image:radial-gradient(circle,#000 20%,transparent 75%)}
.kicker{position:absolute;top:70px;left:0;right:0;text-align:center;z-index:8}
.kicker span{display:inline-block;background:#1a0b2e;color:#f0c46d;font-family:'Archivo Black',sans-serif;font-size:22px;letter-spacing:.3em;padding:12px 26px;text-transform:uppercase;transform:rotate(-2deg)}
.huge{position:absolute;top:170px;left:0;right:0;text-align:center;z-index:8;font-family:'Anton',sans-serif;font-size:170px;line-height:.82;color:#1a0b2e;text-transform:uppercase;
  text-shadow:8px 8px 0 #ff2626,16px 16px 0 rgba(0,0,0,.18)}
.sub{position:absolute;top:500px;left:0;right:0;text-align:center;font-family:'Permanent Marker',cursive;font-size:40px;color:#1a0b2e;z-index:8}
.sub b{color:#ff2626}
.logos{position:absolute;top:620px;left:0;right:0;display:flex;justify-content:center;align-items:center;gap:60px;z-index:8}
.logos .tftc img{height:140px;width:140px}
.logos .tftc .tw .l1{color:#1a0b2e;font-size:80px;text-shadow:4px 4px 0 #ff2626}
.logos .tftc .tw .l2{color:#ff2626;font-size:80px;text-shadow:4px 4px 0 #1a0b2e}
.plus{font-family:'Anton',sans-serif;font-size:120px;color:#ff2626;text-shadow:6px 6px 0 #1a0b2e;line-height:.8}
.af{height:160px;filter:drop-shadow(6px 6px 0 #1a0b2e)}
.bottom{position:absolute;bottom:80px;left:0;right:0;text-align:center;font-family:'Anton',sans-serif;font-size:28px;letter-spacing:.2em;color:#1a0b2e;text-transform:uppercase;z-index:9}
.bottom b{color:#ff2626}
</style></head><body>
<div class="ad"><div class="bg"></div><div class="rays"></div><div class="dots"></div>
  <div class="kicker"><span>◆ It's Official ◆</span></div>
  <div class="huge">Partners<br>In Crime</div>
  <div class="sub">TFT Clash <b>×</b> AutoFull</div>
  <div class="logos">
    <div class="tftc"><img src="../../public/icon.png"><div class="tw"><div class="l1">TFT</div><div class="l2">CLASH</div></div></div>
    <span class="plus">+</span>
    <img class="af" src="../../Autofull/autofull-logo-official.png">
  </div>
  <div class="bottom">◆ Official Seat Partner · <b>2026</b> ◆</div>
</div></body></html>
