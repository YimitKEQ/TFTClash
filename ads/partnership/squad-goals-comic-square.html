<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1080px}
.kicker{position:absolute;top:70px;left:0;right:0;text-align:center;z-index:7}
.kicker span{font-size:20px;padding:12px 26px}
.huge{position:absolute;top:140px;left:0;right:0;text-align:center;font-size:170px;line-height:.82;z-index:8}
.huge span{display:block;font-size:230px}
.chair{position:absolute;left:50%;top:60%;transform:translate(-50%,-50%);height:560px;z-index:4}
.bubble{position:absolute;top:440px;right:40px;z-index:9;padding:20px 28px;max-width:320px;transform:rotate(4deg)}
.bubble::after{content:'';position:absolute;bottom:-26px;right:70px;width:34px;height:34px;background:#fff;border-right:5px solid #1a0b2e;border-bottom:5px solid #1a0b2e;transform:skewX(25deg)}
.bubble .say{font-size:26px}
.lock{position:absolute;bottom:60px;left:60px;right:60px;display:flex;justify-content:center;align-items:center;gap:28px;z-index:9}
.center{display:flex;align-items:center;gap:20px;padding:14px 22px;transform:rotate(-2deg)}
.center .tftc img{height:50px;width:50px}
.center .tftc .tw .l1,.center .tftc .tw .l2{font-size:28px;display:block}
.x{font-family:'Anton',sans-serif;font-size:34px;color:#ff2626}
.af{height:60px}
.cta{font-size:24px;padding:14px 22px;transform:rotate(3deg)}
</style></head><body>
<div class="ad c-bg"><div class="c-bg-radial"></div><div class="c-dots"></div>
  <div class="kicker"><span class="c-kicker">◆ Squad Goals ◆</span></div>
  <div class="huge c-huge">Squad<span>Goals</span></div>
  <img class="chair c-chair" src="../../Autofull/M6 Ultra 2.0.png">
  <div class="bubble c-bubble"><div class="say">two brands, <b>one throne.</b></div></div>
  <div class="lock"><div class="center c-panel"><div class="tftc"><img src="../../public/icon.png"><div class="tw"><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"></div><div class="cta c-cta">Meet →</div></div>
</div></body></html>
