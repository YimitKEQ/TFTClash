<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1200px;height:628px;background:#f0c46d}
.bg{position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,#ffe9ba 0%,#f0c46d 50%,#c48528 100%)}
.dots{position:absolute;inset:0;background-image:radial-gradient(#1a0b2e 2px,transparent 2.5px);background-size:18px 18px;opacity:.2}
.rays{position:absolute;right:-200px;top:50%;transform:translateY(-50%);width:1100px;height:1100px;
  background:conic-gradient(from 0deg,#1a0b2e 0deg 8deg,transparent 8deg 22deg,#1a0b2e 22deg 30deg,transparent 30deg 44deg,#1a0b2e 44deg 52deg,transparent 52deg 66deg,#1a0b2e 66deg 74deg,transparent 74deg 88deg,#1a0b2e 88deg 96deg,transparent 96deg 110deg,#1a0b2e 110deg 118deg,transparent 118deg 132deg,#1a0b2e 132deg 140deg,transparent 140deg 154deg,#1a0b2e 154deg 162deg,transparent 162deg 176deg,#1a0b2e 176deg 184deg,transparent 184deg 198deg,#1a0b2e 198deg 206deg,transparent 206deg 220deg,#1a0b2e 220deg 228deg,transparent 228deg 242deg,#1a0b2e 242deg 250deg,transparent 250deg 264deg,#1a0b2e 264deg 272deg,transparent 272deg 286deg,#1a0b2e 286deg 294deg,transparent 294deg 308deg,#1a0b2e 308deg 316deg,transparent 316deg 330deg,#1a0b2e 330deg 338deg,transparent 338deg 352deg,#1a0b2e 352deg 360deg);
  opacity:.13;mask-image:radial-gradient(circle,#000 25%,transparent 75%)}
.chair{position:absolute;right:40px;top:50%;transform:translateY(-50%);height:580px;z-index:4;
  filter:drop-shadow(10px 10px 0 #1a0b2e) drop-shadow(0 20px 40px rgba(0,0,0,.35))}
.c{position:absolute;left:70px;top:60px;bottom:60px;width:560px;display:flex;flex-direction:column;justify-content:space-between;z-index:6}
.kicker{display:inline-block;background:#1a0b2e;color:#f0c46d;font-family:'Archivo Black',sans-serif;font-size:16px;letter-spacing:.3em;padding:9px 18px;text-transform:uppercase;transform:rotate(-2deg);align-self:flex-start}
.huge{font-family:'Anton',sans-serif;font-size:160px;line-height:.82;color:#1a0b2e;text-transform:uppercase;
  text-shadow:6px 6px 0 #ff2626,12px 12px 0 rgba(0,0,0,.18)}
.sub{font-family:'Anton',sans-serif;font-size:24px;letter-spacing:.12em;color:#1a0b2e;text-transform:uppercase;margin-top:10px}
.lock{background:#1a0b2e;padding:16px 26px;display:flex;justify-content:space-between;align-items:center;border-top:4px solid #ff2626;border-bottom:4px solid #ff2626;transform:rotate(-1deg)}
.tftc img{height:40px;width:40px}
.tftc .tw .l1{color:#f0c46d;font-size:22px}
.tftc .tw .l2{color:#fff;font-size:22px}
.x{font-family:'Anton',sans-serif;font-size:28px;color:#ff2626}
.af{height:48px}
.center{display:flex;align-items:center;gap:18px}
.cta{font-family:'Anton',sans-serif;font-size:20px;letter-spacing:.18em;color:#f0c46d;text-transform:uppercase}
.lock{background:transparent;padding:0;border:none;transform:none}
.center{background:#fff;border:4px solid #1a0b2e;padding:10px 16px;box-shadow:5px 5px 0 #1a0b2e;transform:rotate(-2deg)}
.cta{color:#fff;background:#ff2626;border:4px solid #1a0b2e;padding:10px 16px;box-shadow:5px 5px 0 #1a0b2e;transform:rotate(3deg)}
.tftc .tw .l1{color:#ff2626}
.tftc .tw .l2{color:#1a0b2e}
.af{filter:none}
</style></head><body>
<div class="ad"><div class="bg"></div><div class="rays"></div><div class="dots"></div>
  <img class="chair" src="../../Autofull/M6 Ultra 2.0.png">
  <div class="c">
    <div class="kicker">◆ Issue #01 ◆</div>
    <div><div class="huge">Throne Up!</div><div class="sub">◆ AutoFull M6 Ultra 2.0 ◆</div></div>
    <div class="lock"><div class="center"><div class="tftc"><img src="../../public/icon.png"><div class="tw"><div class="l1">TFT</div><div class="l2">CLASH</div></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"></div><div class="cta">Claim →</div></div>
  </div>
</div></body></html>
