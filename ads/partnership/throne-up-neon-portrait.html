<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1350px;background:#05040f}
.bg{position:absolute;inset:0;background:
  radial-gradient(ellipse at 50% 65%,rgba(255,0,170,.38) 0%,transparent 55%),
  radial-gradient(ellipse at 50% 30%,rgba(0,240,255,.28) 0%,transparent 55%),
  linear-gradient(180deg,#05040f 0%,#0f0618 55%,#1a0425 100%)}
.grid{position:absolute;inset:0;background-image:
  linear-gradient(rgba(0,240,255,.08) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,240,255,.08) 1px,transparent 1px);
  background-size:60px 60px;mask-image:radial-gradient(ellipse at 50% 55%,#000 30%,transparent 80%)}
.scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 1px,transparent 1px,transparent 4px)}
.chair{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);height:940px;z-index:4;
  filter:drop-shadow(-30px 0 80px rgba(255,0,170,.5)) drop-shadow(30px 0 80px rgba(0,240,255,.5)) drop-shadow(0 40px 70px rgba(0,0,0,.9))}
.kicker{position:absolute;top:90px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:22px;letter-spacing:.35em;color:#00f0ff;text-transform:uppercase;z-index:6}
.kicker b{color:#ff00aa}
.h{position:absolute;top:140px;left:0;right:0;text-align:center;z-index:6;font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:186px;line-height:.82;letter-spacing:-.02em;color:#fff;text-transform:uppercase;
  text-shadow:0 0 40px rgba(0,240,255,.7),0 0 80px rgba(255,0,170,.5)}
.h span{display:block;color:transparent;-webkit-text-stroke:3px #ff00aa;text-shadow:0 0 30px rgba(255,0,170,.8)}
.sub{position:absolute;top:1020px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:22px;letter-spacing:.25em;color:rgba(255,255,255,.8);text-transform:uppercase;z-index:6}
.sub b{color:#f0c46d}
.cta{position:absolute;bottom:200px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:28px;letter-spacing:.35em;color:#00f0ff;text-transform:uppercase;z-index:6;text-shadow:0 0 18px rgba(0,240,255,.8),0 0 40px rgba(0,240,255,.4)}
.cta b{color:#ff00aa;text-shadow:0 0 18px rgba(255,0,170,.8)}
.lock{position:absolute;bottom:80px;left:0;right:0;display:flex;justify-content:center;align-items:center;gap:28px;z-index:9}
.tftc img{height:56px;width:56px}
.tftc .tw .l1,.tftc .tw .l2{font-size:32px}
.x{font-family:'Orbitron',sans-serif;font-size:34px;color:#ff00aa}
.af{height:68px;filter:invert(1)}
</style></head><body>
<div class="ad"><div class="bg"></div><div class="grid"></div><div class="scan"></div>
  <div class="kicker">// TFT_CLASH <b>×</b> AUTOFULL</div>
  <div class="h">Boss<span>Mode</span></div>
  <img class="chair" src="../../Autofull/M6 Ultra 2.0.png">
  <div class="sub">◆ AUTOFULL <b>M6 ULTRA 2.0</b> · BUILT FOR THE CLIMB ◆</div>
  <div class="cta">▸ <b>Initialize</b></div>
  <div class="lock"><div class="tftc"><img src="../../public/icon.png"><div class="tw"><div class="l1">TFT</div><div class="l2">CLASH</div></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"></div>
</div></body></html>
