<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1200px;height:628px}
.chair{position:absolute;right:20px;top:50%;transform:translateY(-50%);height:580px;z-index:4;filter:drop-shadow(0 0 40px rgba(255,0,170,.6)) drop-shadow(0 0 100px rgba(0,240,255,.3))}
.c{position:absolute;left:70px;top:70px;bottom:70px;width:620px;display:flex;flex-direction:column;justify-content:space-between;z-index:6}

.lock .tftc .l2{color:#ff00aa;text-shadow:0 0 12px rgba(255,0,170,.8)}
.x{font-family:'JetBrains Mono',monospace;font-size:22px;color:#fff}
.af{height:52px;filter:invert(1)}
.cta{font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:.3em;color:#00f0ff;text-transform:uppercase;text-shadow:0 0 15px rgba(0,240,255,.8);margin-left:auto}
.cta b{color:#ff00aa;text-shadow:0 0 15px rgba(255,0,170,.8)}

<div class="ad n-bg"><div class="n-bg-radial"></div><div class="n-grid"></div><div class="n-scan"></div>
