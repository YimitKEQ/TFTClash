<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1350px;background:#05040f}
.bg{position:absolute;inset:0;background:
  radial-gradient(ellipse at 50% 50%,rgba(255,0,170,.4) 0%,transparent 55%),
  radial-gradient(ellipse at 30% 80%,rgba(0,240,255,.3) 0%,transparent 55%),
  linear-gradient(180deg,#05040f 0%,#0f0618 55%,#1a0425 100%)}
.grid{position:absolute;inset:0;background-image:
  linear-gradient(rgba(0,240,255,.08) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,240,255,.08) 1px,transparent 1px);
  background-size:60px 60px;mask-image:radial-gradient(ellipse at 50% 50%,#000 30%,transparent 80%)}
.scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 1px,transparent 1px,transparent 4px)}
.kicker{position:absolute;top:120px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:22px;letter-spacing:.4em;color:#00f0ff;text-transform:uppercase;z-index:6}
.kicker b{color:#ff00aa}
.h{position:absolute;top:180px;left:0;right:0;text-align:center;z-index:6;font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:148px;line-height:.82;letter-spacing:-.02em;color:#fff;text-transform:uppercase;
  text-shadow:0 0 40px rgba(0,240,255,.7),0 0 80px rgba(255,0,170,.5)}
.h span{display:block;color:transparent;-webkit-text-stroke:3px #ff00aa;text-shadow:0 0 30px rgba(255,0,170,.8)}
.sub{position:absolute;top:580px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:22px;letter-spacing:.28em;color:#f0c46d;text-transform:uppercase;z-index:6}
.logos{position:absolute;top:680px;left:0;right:0;display:flex;justify-content:center;align-items:center;gap:50px;z-index:6}
.logos .plate{display:flex;align-items:center;justify-content:center;min-width:320px;min-height:240px}
.logos .tftc img{height:140px;width:140px;filter:drop-shadow(0 0 20px rgba(240,196,109,.8))}
.logos .tftc .tw .l1{color:#f0c46d;font-size:70px;text-shadow:0 0 16px rgba(240,196,109,.55)}
.logos .tftc .tw .l2{color:#fff;font-size:70px}
.plus{font-family:'Orbitron',sans-serif;font-size:100px;font-weight:900;color:#ff00aa;text-shadow:0 0 30px rgba(255,0,170,.8)}
.af-plate{display:flex;align-items:center;justify-content:center;min-width:260px;min-height:220px}
.af{height:200px;filter:invert(1)}
.cta{position:absolute;bottom:240px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:26px;letter-spacing:.35em;color:#00f0ff;text-transform:uppercase;z-index:6;text-shadow:0 0 18px rgba(0,240,255,.8)}
.cta b{color:#ff00aa;text-shadow:0 0 18px rgba(255,0,170,.8)}
.foot{position:absolute;bottom:120px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.4em;color:rgba(255,255,255,.65);text-transform:uppercase;z-index:6}
.foot b{color:#00f0ff}
</style></head><body>
<div class="ad"><div class="bg"></div><div class="grid"></div><div class="scan"></div>
  <div class="kicker">// SYSTEM.BROADCAST <b>◆</b> 2026</div>
  <div class="h">Official<span>Partners</span></div>
  <div class="sub">◆ TFT CLASH × AUTOFULL ◆</div>
  <div class="logos">
    <div class="plate"><div class="tftc"><img src="../../public/icon.png"><div class="tw"><div class="l1">TFT</div><div class="l2">CLASH</div></div></div></div>
    <span class="plus">+</span>
    <div class="af-plate"><img class="af" src="../../Autofull/autofull-logo-official.png"></div>
  </div>
  <div class="cta">▸ <b>Find Out More</b></div>
  <div class="foot">◆ OFFICIAL SEAT PARTNER <b>·</b> SEASON 01 ◆</div>
</div></body></html>
