<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1350px;background:#f0c46d}
.bg{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,#ffe9ba 0%,#f0c46d 45%,#c48528 100%)}
.dots{position:absolute;inset:0;background-image:radial-gradient(#1a0b2e 2px,transparent 2.5px);background-size:22px 22px;opacity:.2}
.rays{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);width:1500px;height:1500px;
  background:conic-gradient(from 0deg,#1a0b2e 0deg 8deg,transparent 8deg 22deg,#1a0b2e 22deg 30deg,transparent 30deg 44deg,#1a0b2e 44deg 52deg,transparent 52deg 66deg,#1a0b2e 66deg 74deg,transparent 74deg 88deg,#1a0b2e 88deg 96deg,transparent 96deg 110deg,#1a0b2e 110deg 118deg,transparent 118deg 132deg,#1a0b2e 132deg 140deg,transparent 140deg 154deg,#1a0b2e 154deg 162deg,transparent 162deg 176deg,#1a0b2e 176deg 184deg,transparent 184deg 198deg,#1a0b2e 198deg 206deg,transparent 206deg 220deg,#1a0b2e 220deg 228deg,transparent 228deg 242deg,#1a0b2e 242deg 250deg,transparent 250deg 264deg,#1a0b2e 264deg 272deg,transparent 272deg 286deg,#1a0b2e 286deg 294deg,transparent 294deg 308deg,#1a0b2e 308deg 316deg,transparent 316deg 330deg,#1a0b2e 330deg 338deg,transparent 338deg 352deg,#1a0b2e 352deg 360deg);

.kicker{position:absolute;top:70px;left:0;right:0;text-align:center;z-index:7}
.kicker span{display:inline-block;background:#ff2626;color:#fff;font-family:'Archivo Black',sans-serif;font-size:22px;letter-spacing:.3em;padding:14px 30px;text-transform:uppercase;transform:rotate(-2deg);box-shadow:6px 6px 0 #1a0b2e}
.banner{position:absolute;top:180px;left:0;right:0;text-align:center;z-index:8}
.banner .huge{font-family:'Anton',sans-serif;font-size:210px;line-height:.82;letter-spacing:-.01em;color:#1a0b2e;text-transform:uppercase;
  text-shadow:10px 10px 0 #ff2626,20px 20px 0 rgba(0,0,0,.18)}
.sub{position:absolute;top:560px;left:0;right:0;text-align:center;font-family:'Permanent Marker',cursive;font-size:44px;color:#1a0b2e;z-index:8}
.sub b{color:#ff2626}
.chair{position:absolute;left:50%;top:60%;transform:translate(-50%,-50%);height:620px;z-index:4;
  filter:drop-shadow(12px 12px 0 #1a0b2e) drop-shadow(0 25px 40px rgba(0,0,0,.35))}
.info{position:absolute;left:60px;right:60px;bottom:280px;display:flex;justify-content:space-between;z-index:8}
.info .cell{text-align:center;background:#1a0b2e;padding:20px 28px;border:4px solid #ff2626;transform:rotate(-1deg);box-shadow:6px 6px 0 #ff2626}
.info .cell:nth-child(2){transform:rotate(1deg)}
.info .cell .k{font-family:'Archivo Black',sans-serif;font-size:14px;letter-spacing:.3em;color:#f0c46d;text-transform:uppercase}
.info .cell .v{font-family:'Anton',sans-serif;font-size:42px;color:#fff;text-transform:uppercase;margin-top:4px;line-height:.9}
.lock{position:absolute;bottom:60px;left:60px;right:60px;display:flex;justify-content:space-between;align-items:center;z-index:9;
  background:#1a0b2e;padding:24px 40px;border-top:5px solid #ff2626;border-bottom:5px solid #ff2626;transform:rotate(-1deg)}
.tftc img{height:56px;width:56px}
.tftc .tw .l1{color:#f0c46d;font-size:32px}
.tftc .tw .l2{color:#fff;font-size:32px}
.x{font-family:'Anton',sans-serif;font-size:40px;color:#ff2626}
.af{height:68px}
.center{display:flex;align-items:center;gap:24px}
.cta{font-family:'Anton',sans-serif;font-size:28px;letter-spacing:.18em;color:#f0c46d;text-transform:uppercase}
.lock{background:transparent;padding:0;border:none;transform:none;gap:30px;justify-content:center}
.center{background:#fff;border:5px solid #1a0b2e;padding:14px 22px;box-shadow:7px 7px 0 #1a0b2e;transform:rotate(-2deg)}
.cta{color:#fff;background:#ff2626;border:5px solid #1a0b2e;padding:14px 24px;box-shadow:7px 7px 0 #1a0b2e;transform:rotate(3deg)}
.tftc .tw .l1{color:#ff2626}
.tftc .tw .l2{color:#1a0b2e}
.af{filter:none}
</style></head><body>
<div class="ad"><div class="bg"></div><div class="rays"></div><div class="dots"></div>
  <div class="kicker"><span>◆ Every Sunday · 20:00 CET ◆</span></div>
  <div class="banner"><div class="huge">Clash<br>Sunday</div></div>
  <div class="sub">Free entry. <b>Real points.</b> Weekly glory.</div>
  <img class="chair" src="../../Autofull/M6 Ultra 2.0.png">
  <div class="info">
    <div class="cell"><div class="k">Entry</div><div class="v">Free</div></div>
    <div class="cell"><div class="k">Format</div><div class="v">8 Lobbies</div></div>
    <div class="cell"><div class="k">Prize</div><div class="v">Points +<br>Glory</div></div>
  </div>
  <div class="lock"><div class="center"><div class="tftc"><img src="../../public/icon.png"><div class="tw"><div class="l1">TFT</div><div class="l2">CLASH</div></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"></div><div class="cta">Join Now →</div></div>
</div></body></html>
