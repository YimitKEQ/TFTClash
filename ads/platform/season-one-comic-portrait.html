<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1350px}
.kicker{position:absolute;top:70px;left:0;right:0;text-align:center;z-index:7}
.kicker span{font-size:22px;padding:14px 30px}
.huge{position:absolute;top:150px;left:0;right:0;text-align:center;font-size:220px;line-height:.8;z-index:8}
.huge span{display:block;font-size:340px;margin-top:-20px}
.chair{position:absolute;left:50%;top:64%;transform:translate(-50%,-50%);height:660px;z-index:4}
.stamp{position:absolute;top:520px;right:60px;z-index:9;background:#ff2626;color:#fff;font-family:'Anton',sans-serif;font-size:42px;letter-spacing:.1em;text-transform:uppercase;padding:22px 34px;border:6px solid #1a0b2e;box-shadow:10px 10px 0 #1a0b2e;transform:rotate(8deg);text-align:center;line-height:.9}
.stamp b{display:block;font-size:18px;letter-spacing:.3em;color:#f0c46d;margin-bottom:6px}
.sub{position:absolute;left:0;right:0;bottom:290px;text-align:center;font-family:'Permanent Marker',cursive;font-size:38px;color:#1a0b2e;z-index:8}
.sub b{color:#ff2626}
.lock{position:absolute;bottom:80px;left:60px;right:60px;display:flex;justify-content:center;align-items:center;gap:30px;z-index:9}
.center{display:flex;align-items:center;gap:22px;padding:14px 22px;transform:rotate(-2deg)}
.center .tftc img{height:52px;width:52px}
.center .tftc .tw .l1,.center .tftc .tw .l2{font-size:30px;display:block}
.x{font-family:'Anton',sans-serif;font-size:36px;color:#ff2626}
.af{height:62px}
.cta{font-size:26px;padding:14px 24px;transform:rotate(3deg)}
</style></head><body>
<div class="ad c-bg"><div class="c-bg-radial"></div><div class="c-dots"></div>
  <div class="kicker"><span class="c-kicker">◆ Issue #01 ◆</span></div>
  <div class="huge c-huge">Season<span>One</span></div>
  <img class="chair c-chair" src="../../Autofull/M6 Ultra 2.0.png">
  <div class="stamp"><b>Now Live</b>Enter!</div>
  <div class="sub">52 clashes. <b>One throne.</b></div>
  <div class="lock"><div class="center c-panel"><div class="tftc"><img src="../../public/icon.png"><div class="tw"><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"></div><div class="cta c-cta">Play →</div></div>
</div></body></html>
