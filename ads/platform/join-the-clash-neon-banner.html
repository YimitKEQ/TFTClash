<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1200px;height:628px}
.c{position:absolute;inset:70px;display:flex;flex-direction:column;justify-content:space-between;z-index:6}
.kicker{font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.45em;color:#00f0ff;text-transform:uppercase;text-shadow:0 0 15px rgba(0,240,255,.8);text-align:center}
.huge{font-family:'Orbitron',sans-serif;font-weight:900;font-size:170px;line-height:.82;color:transparent;-webkit-text-stroke:3px #00f0ff;text-transform:uppercase;text-align:center;filter:drop-shadow(0 0 30px rgba(0,240,255,.6))}
.huge span{display:inline;color:#fff;-webkit-text-stroke:0;text-shadow:0 0 30px rgba(255,0,170,.9)}
.lock{display:flex;justify-content:center;align-items:center;gap:26px}
.lock .tftc{display:flex;align-items:center;gap:10px}
.lock .tftc img{height:44px;width:44px}
.lock .tftc .l1,.lock .tftc .l2{font-family:'Orbitron',sans-serif;font-weight:900;font-size:22px;display:block;line-height:1}
.lock .tftc .l1{color:#00f0ff;text-shadow:0 0 12px rgba(0,240,255,.8)}
.lock .tftc .l2{color:#ff00aa;text-shadow:0 0 12px rgba(255,0,170,.8)}
.x{font-family:'JetBrains Mono',monospace;font-size:22px;color:#fff}
.af{height:52px;filter:invert(1)}
.cta{font-family:'JetBrains Mono',monospace;font-size:22px;letter-spacing:.3em;color:#00f0ff;text-transform:uppercase;text-shadow:0 0 15px rgba(0,240,255,.8);margin-left:20px}
.cta b{color:#ff00aa;text-shadow:0 0 15px rgba(255,0,170,.8)}
</style></head><body>
<div class="ad n-bg"><div class="n-bg-radial"></div><div class="n-grid"></div><div class="n-scan"></div>
  <div class="c">
    <div class="kicker">◆ LOBBY // OPEN ◆</div>
    <div class="huge">Join The <span>Clash</span></div>
    <div class="lock"><div class="tftc"><img src="../../public/icon.png"><div><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"><div class="cta">▸ <b>Enter</b></div></div>
  </div>
</div></body></html>
