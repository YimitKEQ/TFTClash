<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1080px}
.huge{position:absolute;top:130px;left:0;right:0;text-align:center;font-size:220px;line-height:.82;z-index:8}
.huge span{display:block;font-size:280px}
.table{position:absolute;left:100px;right:100px;top:590px;background:#1a0b2e;border:5px solid #1a0b2e;box-shadow:8px 8px 0 #ff2626;transform:rotate(-1deg);z-index:8;padding:0}
.row{display:flex;border-bottom:3px solid #ff2626;font-family:'Anton',sans-serif}
.row:last-child{border-bottom:none}
.row.h{background:#ff2626}
.row .p{width:50%;text-align:center;padding:14px;color:#f0c46d;font-size:32px;text-transform:uppercase;border-right:3px solid #ff2626}
.row .v{width:50%;text-align:center;padding:14px;color:#fff;font-size:32px}
.row.h .p,.row.h .v{color:#1a0b2e;font-size:20px;letter-spacing:.3em}
.lock{position:absolute;bottom:60px;left:60px;right:60px;display:flex;justify-content:center;align-items:center;gap:28px;z-index:9}
.center{display:flex;align-items:center;gap:20px;padding:14px 22px;transform:rotate(-2deg)}
.center .tftc img{height:50px;width:50px}
.center .tftc .tw .l1,.center .tftc .tw .l2{font-size:28px;display:block}
.x{font-family:'Anton',sans-serif;font-size:34px;color:#ff2626}
.af{height:60px}
.cta{font-size:24px;padding:14px 22px;transform:rotate(3deg)}
</style></head><body>
<div class="ad c-bg"><div class="c-bg-radial"></div><div class="c-dots"></div>
  <div class="huge c-huge">Real<span>Points.</span></div>
  <div class="table">
    <div class="row h"><div class="p">Place</div><div class="v">Points</div></div>
    <div class="row"><div class="p">1st</div><div class="v">8</div></div>
    <div class="row"><div class="p">2nd</div><div class="v">7</div></div>
    <div class="row"><div class="p">3rd</div><div class="v">6</div></div>
    <div class="row"><div class="p">4th</div><div class="v">5</div></div>
  </div>
  <div class="lock"><div class="center c-panel"><div class="tftc"><img src="../../public/icon.png"><div class="tw"><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"></div><div class="cta c-cta">Join →</div></div>
</div></body></html>
