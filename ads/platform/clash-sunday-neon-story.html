<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1920px}
.kicker{position:absolute;top:160px;left:0;right:0;text-align:center;z-index:7;font-size:24px}
.huge{position:absolute;top:260px;left:0;right:0;text-align:center;font-size:220px;line-height:.82;z-index:8}
.huge span{display:block;font-size:220px}
.time{position:absolute;top:860px;left:0;right:0;text-align:center;font-family:'Orbitron',sans-serif;font-weight:900;font-size:130px;color:#fff;text-shadow:0 0 30px rgba(255,0,170,.9),0 0 60px rgba(255,0,170,.5);z-index:8;letter-spacing:.05em}
.time::before{content:'';display:block;width:220px;height:2px;background:#00f0ff;margin:0 auto 20px;box-shadow:0 0 15px rgba(0,240,255,.9)}
.time::after{content:'';display:block;width:220px;height:2px;background:#00f0ff;margin:20px auto 0;box-shadow:0 0 15px rgba(0,240,255,.9)}
.chair{position:absolute;left:50%;top:72%;transform:translate(-50%,-50%);height:840px;z-index:4}
.sub{position:absolute;left:0;right:0;bottom:380px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:32px;letter-spacing:.3em;color:#fff;text-transform:uppercase;z-index:8}
.sub b{color:#00f0ff;text-shadow:0 0 18px rgba(0,240,255,.8)}
.lock{position:absolute;bottom:140px;left:60px;right:60px;gap:40px}
.lock .tftc img{height:72px;width:72px}
.lock .tftc .l1,.lock .tftc .l2{font-size:44px}
.lock .x{font-size:48px}
.lock .af{height:100px}
.cta{font-size:36px;margin-left:auto}
</style></head><body>
<div class="ad n-bg"><div class="n-bg-radial"></div><div class="n-grid"></div><div class="n-scan"></div>
  <div class="kicker n-kicker">◆ CLASH // SUNDAY // CET ◆</div>
  <div class="huge n-huge">Clash<span>Sunday</span></div>
  <div class="time">20:00</div>
  <img class="chair n-chair" src="../../Autofull/M6 Ultra 2.0.png">
  <div class="sub">Be <b>there</b></div>
  <div class="lock n-lock"><div class="tftc"><img src="../../public/icon.png"><div><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"><div class="cta n-cta">▸ <b>Enter</b></div></div>
</div></body></html>
