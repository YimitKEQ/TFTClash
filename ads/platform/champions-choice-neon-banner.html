<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1200px;height:628px;background:#05040f}
.bg{position:absolute;inset:0;background:
  radial-gradient(ellipse at 72% 55%,rgba(255,0,170,.4) 0%,transparent 55%),
  radial-gradient(ellipse at 18% 60%,rgba(0,240,255,.32) 0%,transparent 55%),
  linear-gradient(135deg,#05040f 0%,#0f0618 60%,#1a0425 100%)}
.grid{position:absolute;inset:0;background-image:
  linear-gradient(rgba(0,240,255,.08) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,240,255,.08) 1px,transparent 1px);
  background-size:55px 55px;mask-image:linear-gradient(180deg,transparent 0,#000 40%,#000 70%,transparent 100%)}
.scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 1px,transparent 1px,transparent 4px)}
.chair{position:absolute;right:-20px;top:50%;transform:translateY(-50%);height:620px;z-index:4;
  filter:drop-shadow(-30px 0 70px rgba(255,0,170,.55)) drop-shadow(30px 0 70px rgba(0,240,255,.45)) drop-shadow(0 30px 50px rgba(0,0,0,.9))}
.c{position:absolute;left:80px;top:70px;bottom:70px;width:660px;display:flex;flex-direction:column;justify-content:space-between;z-index:6}
.kicker{font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:.35em;color:#00f0ff;text-transform:uppercase;padding:8px 14px;border:1px solid rgba(0,240,255,.5);background:rgba(0,240,255,.05);align-self:flex-start}
.kicker b{color:#ff00aa}
.h{font-family:'Orbitron',sans-serif;font-weight:900;font-size:110px;line-height:.82;letter-spacing:-.02em;color:#fff;text-transform:uppercase;
  text-shadow:0 0 30px rgba(0,240,255,.75),0 0 70px rgba(255,0,170,.5);margin-top:-6px}
.h span{display:block;color:transparent;-webkit-text-stroke:3px #ff00aa;text-shadow:0 0 26px rgba(255,0,170,.8)}
.sub{font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.25em;color:#f0c46d;text-transform:uppercase;margin-top:-8px}
.bot{display:flex;align-items:center;gap:20px}
.tftc img{height:44px;width:44px}
.tftc .tw .l1,.tftc .tw .l2{font-size:26px}
.x{font-family:'Orbitron',sans-serif;font-size:28px;color:#ff00aa}
.af{height:58px;filter:invert(1)}
.cta{font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.3em;color:#00f0ff;text-transform:uppercase;text-shadow:0 0 14px rgba(0,240,255,.8);margin-left:auto}
.cta b{color:#ff00aa;text-shadow:0 0 14px rgba(255,0,170,.8)}
</style></head><body>
<div class="ad"><div class="bg"></div><div class="grid"></div><div class="scan"></div>
  <img class="chair" src="../../Autofull/M6 Ultra 2.0.png">
  <div class="c">
    <div class="kicker">// TFT_CLASH <b>×</b> AUTOFULL</div>
    <div><div class="h">Champions<span>Sit Here.</span></div></div>
    <div class="sub">◆ M6 ULTRA 2.0 · OFFICIAL SEAT PARTNER ◆</div>
    <div class="bot"><div class="tftc"><img src="../../public/icon.png"><div class="tw"><div class="l1">TFT</div><div class="l2">CLASH</div></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"><div class="cta">▸ <b>Climb</b></div></div>
  </div>
</div></body></html>
