<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1920px;background:#05040f}
.bg{position:absolute;inset:0;background:
  radial-gradient(ellipse at 50% 58%,rgba(255,0,170,.42) 0%,transparent 55%),
  radial-gradient(ellipse at 50% 25%,rgba(0,240,255,.32) 0%,transparent 55%),
  linear-gradient(180deg,#05040f 0%,#0f0618 45%,#1a0425 100%)}
.grid{position:absolute;inset:0;background-image:
  linear-gradient(rgba(0,240,255,.08) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,240,255,.08) 1px,transparent 1px);
  background-size:70px 70px;mask-image:radial-gradient(ellipse at 50% 55%,#000 30%,transparent 85%)}
.scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 1px,transparent 1px,transparent 4px)}
.chair{position:absolute;left:50%;top:60%;transform:translate(-50%,-50%);height:1180px;z-index:4;
  filter:drop-shadow(-30px 0 80px rgba(255,0,170,.5)) drop-shadow(30px 0 80px rgba(0,240,255,.5)) drop-shadow(0 50px 80px rgba(0,0,0,.9))}
.kicker{position:absolute;top:170px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:.55em;color:#00f0ff;text-transform:uppercase;z-index:6}
.kicker b{color:#ff00aa}
.season-num{position:absolute;top:230px;left:0;right:0;text-align:center;z-index:6;font-family:'Orbitron',sans-serif;font-weight:900;font-size:70px;letter-spacing:.6em;color:#f0c46d;text-transform:uppercase;text-shadow:0 0 30px rgba(240,196,109,.6)}
.h{position:absolute;top:320px;left:0;right:0;text-align:center;z-index:6;font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:200px;line-height:.82;letter-spacing:-.03em;color:#fff;text-transform:uppercase;
  text-shadow:0 0 50px rgba(0,240,255,.75),0 0 110px rgba(255,0,170,.5)}
.h span{display:block;color:transparent;-webkit-text-stroke:4px #ff00aa;text-shadow:0 0 40px rgba(255,0,170,.85);font-size:180px}
.date{position:absolute;top:1450px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:26px;letter-spacing:.45em;color:#fff;text-transform:uppercase;z-index:6}
.date b{color:#f0c46d}
.cta{position:absolute;top:1540px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:36px;letter-spacing:.4em;color:#00f0ff;text-transform:uppercase;z-index:6;text-shadow:0 0 26px rgba(0,240,255,.85)}
.cta b{color:#ff00aa;text-shadow:0 0 26px rgba(255,0,170,.85)}
.strip{position:absolute;bottom:210px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.35em;color:rgba(255,255,255,.7);text-transform:uppercase;z-index:6}
.strip b{color:#00f0ff}
.lock{position:absolute;bottom:100px;left:0;right:0;display:flex;justify-content:center;align-items:center;gap:36px;z-index:9}
.tftc img{height:72px;width:72px}
.tftc .tw .l1,.tftc .tw .l2{font-size:42px}
.x{font-family:'Orbitron',sans-serif;font-size:44px;color:#ff00aa}
.af{height:92px;filter:invert(1)}
</style></head><body>
<div class="ad"><div class="bg"></div><div class="grid"></div><div class="scan"></div>
  <div class="kicker">// TFT_CLASH <b>◆</b> SEASON LAUNCH</div>
  <div class="season-num">S · 0 · 1</div>
  <div class="h">Season<span>Opens</span></div>
  <img class="chair" src="../../Autofull/M6 Ultra 2.0.png">
  <div class="date">◆ APRIL 2026 · <b>FREE ENTRY</b> · 12 WEEKS ◆</div>
  <div class="cta">▸ <b>Enter The Clash</b></div>
  <div class="strip">◆ POWERED BY AUTOFULL <b>·</b> OFFICIAL SEAT PARTNER ◆</div>
  <div class="lock"><div class="tftc"><img src="../../public/icon.png"><div class="tw"><div class="l1">TFT</div><div class="l2">CLASH</div></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"></div>
</div></body></html>
