<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1080px}
.kicker{position:absolute;top:60px;left:0;right:0;text-align:center;z-index:7}
.kicker span{font-size:20px;padding:12px 26px}
.huge{position:absolute;top:120px;left:0;right:0;text-align:center;font-size:170px;line-height:.82;z-index:8}
.huge span{display:block;font-size:230px}
.stats{position:absolute;left:60px;right:60px;top:580px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;z-index:8}
.stat{background:#1a0b2e;border:5px solid #1a0b2e;box-shadow:7px 7px 0 #ff2626;padding:22px 12px;text-align:center;transform:rotate(-1deg)}
.stat:nth-child(2){transform:rotate(1deg)}
.stat:nth-child(3){transform:rotate(-1deg)}
.stat .v{font-family:'Anton',sans-serif;font-size:70px;color:#f0c46d;line-height:.9}
.stat .k{font-family:'Archivo Black',sans-serif;font-size:13px;letter-spacing:.2em;color:#fff;text-transform:uppercase;margin-top:8px}
.lock{position:absolute;bottom:60px;left:60px;right:60px;display:flex;justify-content:center;align-items:center;gap:28px;z-index:9}
.center{display:flex;align-items:center;gap:20px;padding:14px 22px;transform:rotate(-2deg)}
.center .tftc img{height:50px;width:50px}
.center .tftc .tw .l1,.center .tftc .tw .l2{font-size:28px;display:block}
.x{font-family:'Anton',sans-serif;font-size:34px;color:#ff2626}
.af{height:60px}
.cta{font-size:24px;padding:14px 22px;transform:rotate(3deg)}
</style></head><body>
<div class="ad c-bg"><div class="c-bg-radial"></div><div class="c-dots"></div>
  <div class="kicker"><span class="c-kicker">◆ The Clash Community ◆</span></div>
  <div class="huge c-huge">The<span>Clash Crew</span></div>
  <div class="stats"><div class="stat"><div class="v">10K+</div><div class="k">Tacticians</div></div><div class="stat"><div class="v">52</div><div class="k">Clashes/Yr</div></div><div class="stat"><div class="v">∞</div><div class="k">Glory</div></div></div>
  <div class="lock"><div class="center c-panel"><div class="tftc"><img src="../../public/icon.png"><div class="tw"><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"></div><div class="cta c-cta">Join →</div></div>
</div></body></html>
