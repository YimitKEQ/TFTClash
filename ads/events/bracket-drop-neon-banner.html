<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1200px;height:628px}
.c{position:absolute;inset:60px;display:flex;flex-direction:column;justify-content:space-between;z-index:6}
.kicker{font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.45em;color:#00f0ff;text-transform:uppercase;text-shadow:0 0 15px rgba(0,240,255,.8);text-align:center}
.huge{font-family:'Orbitron',sans-serif;font-weight:900;font-size:150px;line-height:.82;color:transparent;-webkit-text-stroke:3px #00f0ff;text-transform:uppercase;text-align:center;filter:drop-shadow(0 0 30px rgba(0,240,255,.6))}
.huge span{display:inline;color:#fff;-webkit-text-stroke:0;text-shadow:0 0 30px rgba(255,0,170,.9)}
.br{display:flex;justify-content:center;gap:20px;font-family:'JetBrains Mono',monospace;color:#fff;font-size:20px;text-transform:uppercase;letter-spacing:.2em}
.br span{padding:10px 20px;border:2px solid #00f0ff;box-shadow:0 0 20px rgba(0,240,255,.5) inset,0 0 15px rgba(0,240,255,.5)}
.br span b{color:#ff00aa;text-shadow:0 0 10px rgba(255,0,170,.8)}
.lock{display:flex;justify-content:center;align-items:center;gap:24px}
.lock .tftc{display:flex;align-items:center;gap:10px}
.lock .tftc img{height:40px;width:40px}
.lock .tftc .l1,.lock .tftc .l2{font-family:'Orbitron',sans-serif;font-weight:900;font-size:20px;display:block;line-height:1}
.lock .tftc .l1{color:#00f0ff;text-shadow:0 0 12px rgba(0,240,255,.8)}
.lock .tftc .l2{color:#ff00aa;text-shadow:0 0 12px rgba(255,0,170,.8)}
.x{font-family:'JetBrains Mono',monospace;font-size:20px;color:#fff}
.af{height:48px;filter:invert(1)}
.cta{font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.3em;color:#00f0ff;text-transform:uppercase;text-shadow:0 0 15px rgba(0,240,255,.8);margin-left:14px}
.cta b{color:#ff00aa;text-shadow:0 0 15px rgba(255,0,170,.8)}
</style></head><body>
<div class="ad n-bg"><div class="n-bg-radial"></div><div class="n-grid"></div><div class="n-scan"></div>
  <div class="c">
    <div class="kicker">◆ BRACKET // LIVE ◆</div>
    <div class="huge">Bracket <span>Drop</span></div>
    <div class="br"><span>Top <b>32</b></span><span>Top <b>8</b></span><span>The <b>Throne</b></span></div>
    <div class="lock"><div class="tftc"><img src="../../public/icon.png"><div><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"><div class="cta">▸ <b>View</b></div></div>
  </div>
</div></body></html>
