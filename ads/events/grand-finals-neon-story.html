<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1920px}
.kicker{position:absolute;top:140px;left:0;right:0;text-align:center;z-index:7;font-size:24px}
.huge{position:absolute;top:260px;left:0;right:0;text-align:center;font-size:200px;line-height:.82;z-index:8}
.huge span{display:block;font-size:220px}
.chair{position:absolute;left:50%;top:60%;transform:translate(-50%,-50%);height:1000px;z-index:4}
.prize{position:absolute;top:1340px;left:0;right:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:36px;letter-spacing:.25em;color:#fff;z-index:8;text-transform:uppercase}
.prize b{display:block;font-family:'Orbitron',sans-serif;font-weight:900;font-size:120px;color:#ff00aa;text-shadow:0 0 30px rgba(255,0,170,.9);letter-spacing:.02em;margin-top:14px}
.prize b::before,.prize b::after{content:'';display:inline-block;width:80px;height:3px;background:#00f0ff;vertical-align:middle;margin:0 24px;box-shadow:0 0 12px rgba(0,240,255,.9)}
.lock{position:absolute;bottom:140px;left:60px;right:60px;gap:40px}
.lock .tftc img{height:72px;width:72px}
.lock .tftc .l1,.lock .tftc .l2{font-size:44px}
.lock .x{font-size:48px}
.lock .af{height:100px}
.cta{font-size:36px;margin-left:auto}
</style></head><body>
<div class="ad n-bg"><div class="n-bg-radial"></div><div class="n-grid"></div><div class="n-scan"></div>
  <div class="kicker n-kicker">◆ SEASON_01 // FINALS ◆</div>
  <div class="huge n-huge">Grand<span>Finals</span></div>
  <img class="chair n-chair" src="../../Autofull/M6 Ultra 2.0.png">
  <div class="prize">Top prize<b>The Throne</b></div>
  <div class="lock n-lock"><div class="tftc"><img src="../../public/icon.png"><div><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"><div class="cta n-cta">▸ <b>Watch</b></div></div>
</div></body></html>
