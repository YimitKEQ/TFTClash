<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1080px}
.kicker{position:absolute;top:80px;left:0;right:0;text-align:center;z-index:7;font-size:20px}
.huge{position:absolute;top:150px;left:0;right:0;text-align:center;font-size:170px;line-height:.82;z-index:8}
.huge span{display:block;font-size:200px}
.lock-icon{position:absolute;top:580px;left:0;right:0;text-align:center;font-size:200px;z-index:8;color:#00f0ff;text-shadow:0 0 40px rgba(0,240,255,.9);filter:drop-shadow(0 0 30px rgba(255,0,170,.5))}
.sub{position:absolute;left:0;right:0;bottom:220px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:.3em;color:#fff;text-transform:uppercase;z-index:8}
.sub b{color:#ff00aa;text-shadow:0 0 15px rgba(255,0,170,.8)}
.lock{position:absolute;bottom:60px;left:60px;right:60px;gap:28px}
.lock .tftc img{height:48px;width:48px}
.lock .tftc .l1,.lock .tftc .l2{font-size:28px}
.lock .x{font-size:30px}
.lock .af{height:62px}
.cta{font-size:24px;margin-left:auto}
</style></head><body>
<div class="ad n-bg"><div class="n-bg-radial"></div><div class="n-grid"></div><div class="n-scan"></div>
  <div class="kicker n-kicker">◆ LOBBY // STATUS ◆</div>
  <div class="huge n-huge">Lobby<span>Locked</span></div>
  <div class="lock-icon">▣</div>
  <div class="sub">May the <b>best tactician</b> win</div>
  <div class="lock n-lock"><div class="tftc"><img src="../../public/icon.png"><div><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"><div class="cta n-cta">▸ <b>GL HF</b></div></div>
</div></body></html>
