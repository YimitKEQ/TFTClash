<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1350px}
.kicker{position:absolute;top:70px;left:0;right:0;text-align:center;z-index:7}
.kicker span{font-size:22px;padding:14px 30px}
.huge{position:absolute;top:160px;left:0;right:0;text-align:center;font-size:170px;line-height:.82;z-index:8}
.huge span{display:block;font-size:240px}
.chair{position:absolute;left:50%;top:60%;transform:translate(-50%,-50%);height:660px;z-index:4}
.tag{position:absolute;background:#fff;border:5px solid #1a0b2e;box-shadow:7px 7px 0 #1a0b2e;padding:12px 20px;font-family:'Permanent Marker',cursive;font-size:22px;color:#1a0b2e;z-index:9}
.tag b{color:#ff2626}
.t1{top:480px;left:40px;transform:rotate(-5deg)}
.t2{top:600px;right:30px;transform:rotate(6deg)}
.t3{top:780px;left:60px;transform:rotate(-3deg)}
.t4{top:900px;right:50px;transform:rotate(4deg)}
.lock{position:absolute;bottom:80px;left:60px;right:60px;display:flex;justify-content:center;align-items:center;gap:30px;z-index:9}
.center{display:flex;align-items:center;gap:22px;padding:14px 22px;transform:rotate(-2deg)}
.center .tftc img{height:52px;width:52px}
.center .tftc .tw .l1,.center .tftc .tw .l2{font-size:30px;display:block}
.x{font-family:'Anton',sans-serif;font-size:36px;color:#ff2626}
.af{height:62px}
.cta{font-size:26px;padding:14px 24px;transform:rotate(3deg)}
</style></head><body>
<div class="ad c-bg"><div class="c-bg-radial"></div><div class="c-dots"></div>
  <div class="kicker"><span class="c-kicker">◆ TFT Player IRL ◆</span></div>
  <div class="huge c-huge">Anatomy<span>Of A Tactician</span></div>
  <img class="chair c-chair" src="../../Autofull/M6 Ultra 2.0.png">
  <div class="tag t1">🎧 <b>"one more"</b></div>
  <div class="tag t2">☕ <b>cold coffee</b></div>
  <div class="tag t3">🐉 <b>3★ dreams</b></div>
  <div class="tag t4">👑 <b>chall copium</b></div>
  <div class="lock"><div class="center c-panel"><div class="tftc"><img src="../../public/icon.png"><div class="tw"><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"></div><div class="cta c-cta">Relate →</div></div>
</div></body></html>
