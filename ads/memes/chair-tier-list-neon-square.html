<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1080px}
.kicker{position:absolute;top:60px;left:0;right:0;text-align:center;z-index:7;font-size:18px}
.huge{position:absolute;top:110px;left:0;right:0;text-align:center;font-size:150px;line-height:.82;z-index:8}
.huge span{display:block;font-size:190px}
.tiers{position:absolute;left:60px;right:60px;top:430px;bottom:200px;display:flex;flex-direction:column;gap:12px;z-index:8}
.tier{display:flex;align-items:center;background:rgba(26,11,46,.7);border:2px solid #00f0ff;box-shadow:0 0 20px rgba(0,240,255,.3) inset}
.tier .r{width:100px;text-align:center;font-family:'Orbitron',sans-serif;font-weight:900;font-size:44px;padding:10px 0;line-height:1;flex-shrink:0}
.tier.s .r{color:#ff00aa;text-shadow:0 0 15px rgba(255,0,170,.9)}
.tier.a .r{color:#00f0ff;text-shadow:0 0 15px rgba(0,240,255,.9)}
.tier.b .r{color:#f0c46d;text-shadow:0 0 12px rgba(240,196,109,.7)}
.tier.f .r{color:#5a5a5a}
.tier .n{flex:1;padding:10px 20px;font-family:'JetBrains Mono',monospace;font-size:20px;color:#fff;border-left:2px solid #00f0ff}
.tier .n b{color:#ff00aa;text-shadow:0 0 10px rgba(255,0,170,.8)}
.lock{position:absolute;bottom:60px;left:60px;right:60px;gap:28px}
.lock .tftc img{height:48px;width:48px}
.lock .tftc .l1,.lock .tftc .l2{font-size:28px}
.lock .x{font-size:30px}
.lock .af{height:60px}
.cta{font-size:24px;margin-left:auto}
</style></head><body>
<div class="ad n-bg"><div class="n-bg-radial"></div><div class="n-grid"></div><div class="n-scan"></div>
  <div class="kicker n-kicker">◆ TIER.LIST // CHAIRS ◆</div>
  <div class="huge n-huge">Chair<span>Tier List</span></div>
  <div class="tiers">
    <div class="tier s"><div class="r">S</div><div class="n">AutoFull <b>M6 Ultra 2.0</b></div></div>
    <div class="tier a"><div class="r">A</div><div class="n">other AutoFull models</div></div>
    <div class="tier b"><div class="r">B</div><div class="n">your current office chair</div></div>
    <div class="tier f"><div class="r">F</div><div class="n">that broken stool</div></div>
  </div>
  <div class="lock n-lock"><div class="tftc"><img src="../../public/icon.png"><div><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"><div class="cta n-cta">▸ <b>Climb</b></div></div>
</div></body></html>
