<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1350px;background:#f0c46d}

.tier .body{flex:1;background:#fff;padding:14px 24px;font-family:'Permanent Marker',cursive;font-size:28px;color:#1a0b2e;display:flex;align-items:center;gap:16px;min-height:110px}
.tier .body b{color:#ff2626}
.tier.s{top:340px}

.tier.a{top:480px}

.tier.b{top:600px}

.tier.c{top:720px}

.tier.f{top:840px}
.tier.f .label{background:#5a5a5a;color:#fff}
.chair-mini{height:90px;filter:drop-shadow(4px 4px 0 #1a0b2e)}
.crown{position:absolute;top:330px;left:80px;font-size:64px;z-index:8;transform:rotate(-20deg);filter:drop-shadow(3px 3px 0 #1a0b2e)}
.lock{position:absolute;bottom:60px;left:60px;right:60px;display:flex;justify-content:space-between;align-items:center;z-index:9;

.tftc img{height:52px;width:52px}
.tftc .tw .l1{color:#f0c46d;font-size:30px}
.tftc .tw .l2{color:#fff;font-size:30px}
.x{font-family:'Anton',sans-serif;font-size:38px;color:#ff2626}
.af{height:60px}
.center{display:flex;align-items:center;gap:22px}
.cta{font-family:'Anton',sans-serif;font-size:26px;letter-spacing:.18em;color:#f0c46d;text-transform:uppercase}
.lock{background:transparent;padding:0;border:none;transform:none;gap:30px;justify-content:center}
.center{background:#fff;border:5px solid #1a0b2e;padding:14px 22px;box-shadow:7px 7px 0 #1a0b2e;transform:rotate(-2deg)}
.cta{color:#fff;background:#ff2626;border:5px solid #1a0b2e;padding:14px 24px;box-shadow:7px 7px 0 #1a0b2e;transform:rotate(3deg)}
.tftc .tw .l1{color:#ff2626}
.tftc .tw .l2{color:#1a0b2e}
.af{filter:none}
