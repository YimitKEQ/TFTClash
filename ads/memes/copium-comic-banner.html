<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1200px;height:628px}
.chair{position:absolute;right:30px;top:50%;transform:translateY(-50%);height:560px;z-index:4;filter:drop-shadow(10px 10px 0 #1a0b2e) drop-shadow(0 20px 40px rgba(0,0,0,.3))}
.c{position:absolute;left:70px;top:60px;bottom:60px;width:620px;display:flex;flex-direction:column;justify-content:space-between;z-index:6}

.x{font-family:'Anton',sans-serif;font-size:28px;color:#ff2626}
.af{height:50px}
.cta{font-size:20px;padding:10px 18px;transform:rotate(3deg);margin-left:auto}
</style></head><body>
<div class="ad c-bg"><div class="c-bg-radial"></div><div class="c-dots"></div>

  </div>
