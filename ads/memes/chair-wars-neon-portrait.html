<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1350px}
.kicker{position:absolute;top:100px;left:0;right:0;text-align:center;z-index:7;font-size:22px}
.huge{position:absolute;top:180px;left:0;right:0;text-align:center;font-size:160px;line-height:.82;z-index:8}
.huge span{display:block;font-size:260px}
.chair{position:absolute;left:50%;top:58%;transform:translate(-50%,-50%);height:680px;z-index:4}
.sub{position:absolute;left:0;right:0;bottom:300px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:28px;letter-spacing:.2em;color:#fff;text-transform:uppercase;z-index:8}
.sub b{color:#00f0ff;text-shadow:0 0 18px rgba(0,240,255,.8)}
.sub i{color:#ff00aa;text-shadow:0 0 18px rgba(255,0,170,.8);font-style:normal}
.lock{position:absolute;bottom:80px;left:60px;right:60px;gap:30px}
.lock .tftc img{height:52px;width:52px}
.lock .tftc .l1,.lock .tftc .l2{font-size:30px}
.lock .x{font-size:32px}
.lock .af{height:68px}
.cta{font-size:28px;margin-left:auto}
</style></head><body>
<div class="ad n-bg"><div class="n-bg-radial"></div><div class="n-grid"></div><div class="n-scan"></div>
  <div class="kicker n-kicker">◆ CHAIR.WARS ◆</div>
  <div class="huge n-huge">Episode<span>VIII</span></div>
  <img class="chair n-chair" src="../../Autofull/M6 Ultra 2.0.png">
  <div class="sub">A new <b>throne</b> has <i>arrived</i></div>
  <div class="lock n-lock"><div class="tftc"><img src="../../public/icon.png"><div><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"><div class="cta n-cta">▸ <b>Witness</b></div></div>
</div></body></html>
