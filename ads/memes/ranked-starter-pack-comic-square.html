<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1080px}
.kicker{position:absolute;top:60px;left:0;right:0;text-align:center;z-index:7}
.kicker span{font-size:20px;padding:12px 26px}
.huge{position:absolute;top:120px;left:0;right:0;text-align:center;font-size:150px;line-height:.82;z-index:8}
.huge span{display:block;font-size:210px}
.grid{position:absolute;top:440px;left:60px;right:60px;bottom:200px;display:grid;grid-template-columns:1fr 1fr;gap:30px;z-index:8}
.tile{background:#1a0b2e;border:5px solid #1a0b2e;box-shadow:6px 6px 0 #ff2626;padding:18px;display:flex;align-items:center;gap:14px;transform:rotate(-1deg)}
.tile:nth-child(2){transform:rotate(1deg)}
.tile:nth-child(3){transform:rotate(1deg)}
.tile:nth-child(4){transform:rotate(-1deg)}
.tile .ic{width:56px;height:56px;background:#ff2626;display:flex;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:36px;color:#fff;flex-shrink:0}
.tile img.ic{padding:6px;width:56px;height:56px;object-fit:contain}
.tile .lab{font-family:'Permanent Marker',cursive;font-size:22px;color:#fff;line-height:1.1}
.tile .lab b{color:#f0c46d}
.lock{position:absolute;bottom:60px;left:60px;right:60px;display:flex;justify-content:center;align-items:center;gap:28px;z-index:9}
.center{display:flex;align-items:center;gap:20px;padding:14px 22px;transform:rotate(-2deg)}
.center .tftc img{height:50px;width:50px}
.center .tftc .tw .l1,.center .tftc .tw .l2{font-size:28px;display:block}
.x{font-family:'Anton',sans-serif;font-size:34px;color:#ff2626}
.af{height:60px}
.cta{font-size:24px;padding:14px 22px;transform:rotate(3deg)}
</style></head><body>
<div class="ad c-bg"><div class="c-bg-radial"></div><div class="c-dots"></div>
  <div class="kicker"><span class="c-kicker">◆ Starter Pack ◆</span></div>
  <div class="huge c-huge">Ranked<span>Starter Pack</span></div>
  <div class="grid">
    <div class="tile"><div class="ic">☕</div><div class="lab"><b>3am</b> copium</div></div>
    <div class="tile"><div class="ic">💀</div><div class="lab"><b>8th</b> place rage</div></div>
    <div class="tile"><img class="ic" src="../../Autofull/autofull-logo-official.png"><div class="lab"><b>AutoFull</b> throne</div></div>
    <div class="tile"><div class="ic">🏆</div><div class="lab"><b>TFT Clash</b> glory</div></div>
  </div>
  <div class="lock"><div class="center c-panel"><div class="tftc"><img src="../../public/icon.png"><div class="tw"><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"></div><div class="cta c-cta">Same →</div></div>
</div></body></html>
