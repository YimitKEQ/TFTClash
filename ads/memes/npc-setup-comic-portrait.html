<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1350px}
.kicker{position:absolute;top:80px;left:0;right:0;text-align:center;z-index:7}
.kicker span{font-size:22px;padding:14px 30px}
.huge{position:absolute;top:170px;left:0;right:0;text-align:center;font-size:200px;line-height:.82;z-index:8}
.huge span{display:block;font-size:260px}
.vs{position:absolute;top:640px;left:0;right:0;text-align:center;font-family:'Anton',sans-serif;font-size:80px;color:#ff2626;text-shadow:6px 6px 0 #1a0b2e;z-index:9}
.npc{position:absolute;top:540px;left:70px;width:300px;height:300px;background:#5a5a5a;border:5px solid #1a0b2e;box-shadow:8px 8px 0 #1a0b2e;transform:rotate(-3deg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;z-index:8}
.npc .em{font-size:100px;margin-bottom:10px}
.npc .lab{font-family:'Permanent Marker',cursive;font-size:24px;color:#fff;text-align:center}
.you{position:absolute;top:540px;right:70px;width:300px;height:300px;background:#fff;border:5px solid #1a0b2e;box-shadow:8px 8px 0 #ff2626;transform:rotate(3deg);display:flex;align-items:center;justify-content:center;z-index:8;padding:20px}
.you img{height:260px;filter:drop-shadow(4px 4px 0 #1a0b2e)}
.labels{position:absolute;top:870px;left:70px;right:70px;display:flex;justify-content:space-between;z-index:9}
.labels .l{font-family:'Anton',sans-serif;font-size:42px;text-transform:uppercase;text-shadow:3px 3px 0 #1a0b2e;width:300px;text-align:center}
.labels .l.npc-l{color:#fff}
.labels .l.you-l{color:#ff2626}
.lock{position:absolute;bottom:80px;left:60px;right:60px;display:flex;justify-content:center;align-items:center;gap:30px;z-index:9}
.center{display:flex;align-items:center;gap:22px;padding:14px 22px;transform:rotate(-2deg)}
.center .tftc img{height:52px;width:52px}
.center .tftc .tw .l1,.center .tftc .tw .l2{font-size:30px;display:block}
.x{font-family:'Anton',sans-serif;font-size:36px;color:#ff2626}
.af{height:62px}
.cta{font-size:26px;padding:14px 24px;transform:rotate(3deg)}
</style></head><body>
<div class="ad c-bg"><div class="c-bg-radial"></div><div class="c-dots"></div>
  <div class="kicker"><span class="c-kicker">◆ NPC vs You ◆</span></div>
  <div class="huge c-huge">Setup<span>Check</span></div>
  <div class="npc"><div class="em">💀</div><div class="lab">kitchen stool</div></div>
  <div class="you"><img src="../../Autofull/M6 Ultra 2.0.png"></div>
  <div class="vs">VS</div>
  <div class="labels"><div class="l npc-l">NPC</div><div class="l you-l">You</div></div>
  <div class="lock"><div class="center c-panel"><div class="tftc"><img src="../../public/icon.png"><div class="tw"><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"></div><div class="cta c-cta">Upgrade →</div></div>
</div></body></html>
