<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1080px;background:#f0c46d}
.bg{position:absolute;inset:0;background:radial-gradient(circle at 50% 55%,#ffe9ba 0%,#f0c46d 50%,#c48528 100%)}
.dots{position:absolute;inset:0;background-image:radial-gradient(#1a0b2e 2px,transparent 2.5px);background-size:22px 22px;opacity:.2}
.rays{position:absolute;left:50%;top:55%;transform:translate(-50%,-50%);width:1300px;height:1300px;
  background:conic-gradient(from 0deg,#1a0b2e 0deg 8deg,transparent 8deg 22deg,#1a0b2e 22deg 30deg,transparent 30deg 44deg,#1a0b2e 44deg 52deg,transparent 52deg 66deg,#1a0b2e 66deg 74deg,transparent 74deg 88deg,#1a0b2e 88deg 96deg,transparent 96deg 110deg,#1a0b2e 110deg 118deg,transparent 118deg 132deg,#1a0b2e 132deg 140deg,transparent 140deg 154deg,#1a0b2e 154deg 162deg,transparent 162deg 176deg,#1a0b2e 176deg 184deg,transparent 184deg 198deg,#1a0b2e 198deg 206deg,transparent 206deg 220deg,#1a0b2e 220deg 228deg,transparent 228deg 242deg,#1a0b2e 242deg 250deg,transparent 250deg 264deg,#1a0b2e 264deg 272deg,transparent 272deg 286deg,#1a0b2e 286deg 294deg,transparent 294deg 308deg,#1a0b2e 308deg 316deg,transparent 316deg 330deg,#1a0b2e 330deg 338deg,transparent 338deg 352deg,#1a0b2e 352deg 360deg);
  opacity:.13;mask-image:radial-gradient(circle,#000 20%,transparent 72%)}
.huge{position:absolute;top:110px;left:0;right:0;text-align:center;font-family:'Anton',sans-serif;font-size:170px;line-height:.82;color:#1a0b2e;text-transform:uppercase;z-index:8;
  text-shadow:8px 8px 0 #ff2626,16px 16px 0 rgba(0,0,0,.18)}
.huge span{display:block;color:#ff2626;font-size:240px;text-shadow:8px 8px 0 #1a0b2e}
.chair{position:absolute;left:50%;top:60%;transform:translate(-50%,-50%);height:680px;z-index:4;
  filter:drop-shadow(12px 12px 0 #1a0b2e) drop-shadow(0 25px 40px rgba(0,0,0,.35))}
.bubble{position:absolute;right:60px;top:360px;z-index:8;
  background:#fff;border:5px solid #1a0b2e;border-radius:30px;padding:18px 26px;max-width:340px;
  transform:rotate(4deg);box-shadow:8px 8px 0 #1a0b2e}
.bubble::after{content:'';position:absolute;bottom:-26px;right:70px;width:36px;height:36px;background:#fff;border-right:5px solid #1a0b2e;border-bottom:5px solid #1a0b2e;transform:skewX(25deg)}
.bubble .say{font-family:'Permanent Marker',cursive;font-size:28px;color:#1a0b2e;line-height:1.15}
.bubble .say b{color:#ff2626}
.lock{position:absolute;bottom:50px;left:60px;right:60px;display:flex;justify-content:space-between;align-items:center;z-index:9;
  background:#1a0b2e;padding:22px 40px;border-top:5px solid #ff2626;border-bottom:5px solid #ff2626;transform:rotate(-1deg)}
.tftc img{height:52px;width:52px}
.tftc .tw .l1{color:#f0c46d;font-size:30px}
.tftc .tw .l2{color:#fff;font-size:30px}
.x{font-family:'Anton',sans-serif;font-size:36px;color:#ff2626}
.af{height:62px}
.center{display:flex;align-items:center;gap:22px}
.cta{font-family:'Anton',sans-serif;font-size:26px;letter-spacing:.18em;color:#f0c46d;text-transform:uppercase}
.lock{background:transparent;padding:0;border:none;transform:none;gap:30px;justify-content:center}
.center{background:#fff;border:5px solid #1a0b2e;padding:14px 22px;box-shadow:7px 7px 0 #1a0b2e;transform:rotate(-2deg)}
.cta{color:#fff;background:#ff2626;border:5px solid #1a0b2e;padding:14px 24px;box-shadow:7px 7px 0 #1a0b2e;transform:rotate(3deg)}
.tftc .tw .l1{color:#ff2626}
.tftc .tw .l2{color:#1a0b2e}
.af{filter:none}
</style></head><body>
<div class="ad"><div class="bg"></div><div class="rays"></div><div class="dots"></div>
  <div class="huge">Your Setup<span>Is Mid.</span></div>
  <img class="chair" src="../../Autofull/M6 Ultra 2.0.png">
  <div class="bubble"><div class="say">Let's fix that, <b>champ.</b></div></div>
  <div class="lock"><div class="center"><div class="tftc"><img src="../../public/icon.png"><div class="tw"><div class="l1">TFT</div><div class="l2">CLASH</div></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"></div><div class="cta">Upgrade →</div></div>
</div></body></html>
