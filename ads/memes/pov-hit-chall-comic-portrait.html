<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1350px}
.kicker{position:absolute;top:70px;left:0;right:0;text-align:center;z-index:7}
.kicker span{font-size:22px;padding:14px 30px}
.huge{position:absolute;top:170px;left:0;right:0;text-align:center;font-size:180px;line-height:.82;z-index:8}
.huge span{display:block;font-size:240px}
.chair{position:absolute;left:50%;top:62%;transform:translate(-50%,-50%);height:680px;z-index:4}
.bubble1{position:absolute;top:520px;left:60px;z-index:9;padding:20px 28px;max-width:340px;transform:rotate(-5deg)}
.bubble1::after{content:'';position:absolute;bottom:-28px;left:80px;width:36px;height:36px;background:#fff;border-right:5px solid #1a0b2e;border-bottom:5px solid #1a0b2e;transform:skewX(-25deg)}
.bubble1 .say{font-size:30px}
.bubble2{position:absolute;top:560px;right:60px;z-index:9;padding:20px 28px;max-width:340px;transform:rotate(5deg)}
.bubble2::after{content:'';position:absolute;bottom:-28px;right:80px;width:36px;height:36px;background:#fff;border-right:5px solid #1a0b2e;border-bottom:5px solid #1a0b2e;transform:skewX(25deg)}
.bubble2 .say{font-size:28px}
.lock{position:absolute;bottom:80px;left:60px;right:60px;display:flex;justify-content:center;align-items:center;gap:30px;z-index:9}
.center{display:flex;align-items:center;gap:22px;padding:14px 22px;transform:rotate(-2deg)}
.center .tftc img{height:52px;width:52px}
.center .tftc .tw .l1,.center .tftc .tw .l2{font-size:30px;display:block}
.x{font-family:'Anton',sans-serif;font-size:36px;color:#ff2626}
.af{height:62px}
.cta{font-size:26px;padding:14px 24px;transform:rotate(3deg)}
</style></head><body>
<div class="ad c-bg"><div class="c-bg-radial"></div><div class="c-dots"></div>
  <div class="kicker"><span class="c-kicker">◆ POV ◆</span></div>
  <div class="huge c-huge">You Hit<span>Challenger</span></div>
  <img class="chair c-chair" src="../../Autofull/M6 Ultra 2.0.png">
  <div class="bubble1 c-bubble"><div class="say">mom, I did <b>it.</b></div></div>
  <div class="bubble2 c-bubble"><div class="say">who's <b>Mortdog</b> now?</div></div>
  <div class="lock"><div class="center c-panel"><div class="tftc"><img src="../../public/icon.png"><div class="tw"><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"></div><div class="cta c-cta">Clash →</div></div>
</div></body></html>
