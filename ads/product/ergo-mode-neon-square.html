<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1080px}
.kicker{position:absolute;top:90px;left:0;right:0;text-align:center;z-index:7;font-size:18px}
.huge{position:absolute;top:150px;left:0;right:0;text-align:center;z-index:8;font-size:150px;line-height:.85}
.huge span{display:block;font-size:180px}
.chair{position:absolute;left:50%;top:58%;transform:translate(-50%,-50%);height:600px;z-index:4}
.specs{position:absolute;left:50px;right:50px;bottom:200px;display:flex;justify-content:space-between;z-index:8}
.specs .s{text-align:center;font-family:'JetBrains Mono',monospace;color:#fff}
.specs .s .k{font-size:13px;letter-spacing:.3em;color:#00f0ff;text-shadow:0 0 10px rgba(0,240,255,.8);text-transform:uppercase}
.specs .s .v{font-family:'Orbitron',sans-serif;font-size:30px;color:#ff00aa;text-shadow:0 0 15px rgba(255,0,170,.7);margin-top:6px;text-transform:uppercase}
.lock{bottom:60px;left:60px;right:60px}
.lock .tftc img{height:48px;width:48px}
.lock .tftc .l1,.lock .tftc .l2{font-size:28px}
.lock .x{font-size:30px}
.lock .af{height:62px}
.cta{font-size:24px;margin-left:auto}
</style></head><body>
<div class="ad n-bg"><div class="n-bg-radial"></div><div class="n-grid"></div><div class="n-scan"></div>
  <div class="kicker n-kicker">◆ ERGO_MODE // MAX_COMFORT ◆</div>
  <div class="huge n-huge">Endgame<span>Comfort</span></div>
  <img class="chair n-chair" src="../../Autofull/M6 Ultra 2.0.png">
  <div class="specs"><div class="s"><div class="k">Lumbar</div><div class="v">Dynamic</div></div><div class="s"><div class="k">Armrests</div><div class="v">4D</div></div><div class="s"><div class="k">Mode</div><div class="v">God Tier</div></div></div>
  <div class="lock n-lock"><div class="tftc"><img src="../../public/icon.png"><div><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"><div class="cta n-cta">▸ <b>Unlock</b></div></div>
</div></body></html>
