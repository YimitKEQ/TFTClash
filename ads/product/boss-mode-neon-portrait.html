<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../_base.css"><style>
.ad{width:1080px;height:1350px;background:#05020d;overflow:hidden}
.bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 55%,rgba(255,0,170,.35) 0%,rgba(0,240,255,.12) 40%,#05020d 75%)}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,240,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,.08) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(circle,#000 40%,transparent 80%)}
.scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,240,255,.04) 3px,rgba(0,240,255,.04) 4px)}
.kicker{position:absolute;top:90px;left:0;right:0;text-align:center;z-index:7;font-family:'JetBrains Mono',monospace;font-size:20px;letter-spacing:.55em;color:#00f0ff;text-transform:uppercase;text-shadow:0 0 20px rgba(0,240,255,.8)}
.huge{position:absolute;top:180px;left:0;right:0;text-align:center;z-index:8;font-family:'Orbitron',sans-serif;font-weight:900;font-size:210px;line-height:.85;color:transparent;-webkit-text-stroke:3px #00f0ff;text-transform:uppercase;letter-spacing:-.02em;filter:drop-shadow(0 0 35px rgba(0,240,255,.6))}
.huge span{display:block;color:#fff;-webkit-text-stroke:0;text-shadow:0 0 40px rgba(255,0,170,.9),0 0 80px rgba(255,0,170,.5);font-size:210px}
.chair{position:absolute;left:50%;top:58%;transform:translate(-50%,-50%);height:700px;z-index:4;filter:drop-shadow(0 0 50px rgba(255,0,170,.65)) drop-shadow(0 0 120px rgba(0,240,255,.35))}
.sub{position:absolute;left:0;right:0;bottom:280px;text-align:center;z-index:8;font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:.3em;color:#fff;text-transform:uppercase}
.sub b{color:#ff00aa;text-shadow:0 0 15px rgba(255,0,170,.8)}
.lock{position:absolute;bottom:80px;left:60px;right:60px;display:flex;justify-content:center;align-items:center;gap:40px;z-index:9}
.tftc{display:flex;align-items:center;gap:14px}
.tftc img{height:52px;width:52px}
.tftc .l1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:30px;color:#00f0ff;text-shadow:0 0 15px rgba(0,240,255,.8);display:block;line-height:1}
.tftc .l2{font-family:'Orbitron',sans-serif;font-weight:900;font-size:30px;color:#ff00aa;text-shadow:0 0 15px rgba(255,0,170,.8);display:block;line-height:1}
.x{font-family:'JetBrains Mono',monospace;font-size:32px;color:#fff}
.af{height:70px;filter:invert(1)}
.cta{font-family:'JetBrains Mono',monospace;font-size:28px;letter-spacing:.35em;color:#00f0ff;text-transform:uppercase;text-shadow:0 0 18px rgba(0,240,255,.8);margin-left:auto}
.cta b{color:#ff00aa;text-shadow:0 0 18px rgba(255,0,170,.8)}
</style></head><body>
<div class="ad"><div class="bg"></div><div class="grid"></div><div class="scan"></div>
  <div class="kicker">◆ BOSS_MODE // ENGAGED ◆</div>
  <div class="huge">Boss<span>Mode</span></div>
  <img class="chair" src="../../Autofull/M6 Ultra 2.0.png">
  <div class="sub">Sit like the <b>final boss</b></div>
  <div class="lock"><div class="tftc"><img src="../../public/icon.png"><div><span class="l1">TFT</span><span class="l2">CLASH</span></div></div><span class="x">×</span><img class="af" src="../../Autofull/autofull-logo-official.png"><div class="cta">▸ <b>Deploy</b></div></div>
</div></body></html>
