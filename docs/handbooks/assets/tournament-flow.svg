<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" font-family="Inter, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0F16"/>
      <stop offset="100%" stop-color="#1B1B27"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#74C7B5"/>
    </marker>
  </defs>
  <rect width="1200" height="480" fill="url(#bg2)"/>
  <text x="60" y="60" font-size="14" font-weight="700" letter-spacing="6" fill="#74C7B5">TOURNAMENT LIFECYCLE</text>
  <text x="60" y="100" font-size="28" font-weight="900" fill="#FFFFFF">From draft to results in 5 phases</text>

  <g font-size="13" font-weight="700" letter-spacing="3" text-anchor="middle">
    <g transform="translate(120, 190)">
      <rect x="-90" y="-30" width="180" height="80" rx="8" fill="#1F1F2A" stroke="#5C7A8C" stroke-width="2"/>
      <text y="0" fill="#9aa0aa">DRAFT</text>
      <text y="24" font-size="11" font-weight="500" fill="#FFFFFF">Host fills name,</text>
      <text y="40" font-size="11" font-weight="500" fill="#FFFFFF">date, prize pool</text>
    </g>

    <g transform="translate(340, 190)">
      <rect x="-90" y="-30" width="180" height="80" rx="8" fill="#1F1F2A" stroke="#74C7B5" stroke-width="2"/>
      <text y="0" fill="#74C7B5">REGISTRATION</text>
      <text y="24" font-size="11" font-weight="500" fill="#FFFFFF">Players sign up,</text>
      <text y="40" font-size="11" font-weight="500" fill="#FFFFFF">waitlist auto</text>
    </g>

    <g transform="translate(560, 190)">
      <rect x="-90" y="-30" width="180" height="80" rx="8" fill="#1F1F2A" stroke="#D9B9FF" stroke-width="2"/>
      <text y="0" fill="#D9B9FF">CHECK-IN</text>
      <text y="24" font-size="11" font-weight="500" fill="#FFFFFF">15-min window,</text>
      <text y="40" font-size="11" font-weight="500" fill="#FFFFFF">lobbies seeded</text>
    </g>

    <g transform="translate(780, 190)">
      <rect x="-90" y="-30" width="180" height="80" rx="8" fill="#1F1F2A" stroke="#FF5050" stroke-width="2"/>
      <text y="0" fill="#FF5050">LIVE</text>
      <text y="24" font-size="11" font-weight="500" fill="#FFFFFF">4 rounds,</text>
      <text y="40" font-size="11" font-weight="500" fill="#FFFFFF">bracket auto-advance</text>
    </g>

    <g transform="translate(1000, 190)">
      <rect x="-90" y="-30" width="180" height="80" rx="8" fill="#1F1F2A" stroke="#E8A838" stroke-width="2"/>
      <text y="0" fill="#E8A838">RESULTS</text>
      <text y="24" font-size="11" font-weight="500" fill="#FFFFFF">Podium + payouts,</text>
      <text y="40" font-size="11" font-weight="500" fill="#FFFFFF">archived to HoF</text>
    </g>
  </g>

  <g stroke="#74C7B5" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="216" y1="190" x2="240" y2="190"/>
    <line x1="436" y1="190" x2="460" y2="190"/>
    <line x1="656" y1="190" x2="680" y2="190"/>
    <line x1="876" y1="190" x2="900" y2="190"/>
  </g>

  <g font-size="11" fill="#9aa0aa" text-anchor="middle">
    <text x="120" y="320">Anytime before</text>
    <text x="340" y="320">~7 days out</text>
    <text x="560" y="320">15 min before</text>
    <text x="780" y="320">~90 minutes</text>
    <text x="1000" y="320">Within 5 min</text>
  </g>

  <g font-size="12" font-weight="700" letter-spacing="2" text-anchor="middle">
    <text x="600" y="400" fill="#74C7B5">EVERY STEP IS LIVE-UPDATED VIA SUPABASE REALTIME</text>
    <text x="600" y="425" font-size="11" font-weight="500" letter-spacing="0" fill="#9aa0aa">Players see roster changes, hosts see check-ins, spectators see scores - no refresh needed</text>
  </g>
</svg>
