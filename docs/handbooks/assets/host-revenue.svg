<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0F16"/>
      <stop offset="100%" stop-color="#1B1B27"/>
    </linearGradient>
    <linearGradient id="goldgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8A838"/>
      <stop offset="100%" stop-color="#D9B9FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="540" fill="url(#bg3)"/>
  <text x="60" y="60" font-size="14" font-weight="700" letter-spacing="6" fill="#E8A838">REVENUE STACK</text>
  <text x="60" y="100" font-size="28" font-weight="900" fill="#FFFFFF">Hosts have three revenue streams</text>

  <!-- Stream 1: Subscription -->
  <g transform="translate(60, 160)">
    <rect width="340" height="320" rx="14" fill="#1F1F2A" stroke="url(#goldgrad)" stroke-width="2"/>
    <text x="24" y="50" font-size="13" font-weight="700" letter-spacing="4" fill="#E8A838">1 - SPONSORSHIPS</text>
    <text x="24" y="100" font-size="48" font-weight="900" fill="#FFFFFF">70%</text>
    <text x="100" y="100" font-size="14" fill="#9aa0aa">to host</text>
    <text x="24" y="120" font-size="14" fill="#9aa0aa">30% platform</text>
    <text x="24" y="170" font-size="13" fill="#FFFFFF" font-weight="700">Sponsor placements:</text>
    <text x="24" y="195" font-size="12" fill="#9aa0aa">- Tournament page banner</text>
    <text x="24" y="215" font-size="12" fill="#9aa0aa">- OBS overlay watermark</text>
    <text x="24" y="235" font-size="12" fill="#9aa0aa">- Match-thread pinned post</text>
    <text x="24" y="255" font-size="12" fill="#9aa0aa">- Email blast to attendees</text>
    <text x="24" y="285" font-size="11" font-weight="700" letter-spacing="2" fill="#E8A838">EXAMPLE: 500 EUR DEAL</text>
    <text x="24" y="305" font-size="12" fill="#FFFFFF">Host nets 350 EUR per tournament</text>
  </g>

  <!-- Stream 2: Bounties -->
  <g transform="translate(430, 160)">
    <rect width="340" height="320" rx="14" fill="#1F1F2A" stroke="#74C7B5" stroke-width="2"/>
    <text x="24" y="50" font-size="13" font-weight="700" letter-spacing="4" fill="#74C7B5">2 - FAN BOUNTIES</text>
    <text x="24" y="100" font-size="48" font-weight="900" fill="#FFFFFF">100%</text>
    <text x="120" y="100" font-size="14" fill="#9aa0aa">to host</text>
    <text x="24" y="120" font-size="14" fill="#9aa0aa">platform takes 0</text>
    <text x="24" y="170" font-size="13" fill="#FFFFFF" font-weight="700">Fans tip toward:</text>
    <text x="24" y="195" font-size="12" fill="#9aa0aa">- Bigger prize pool</text>
    <text x="24" y="215" font-size="12" fill="#9aa0aa">- Specific player bounties</text>
    <text x="24" y="235" font-size="12" fill="#9aa0aa">- Cosmetic unlocks</text>
    <text x="24" y="255" font-size="12" fill="#9aa0aa">- Custom comp challenges</text>
    <text x="24" y="285" font-size="11" font-weight="700" letter-spacing="2" fill="#74C7B5">FAN GOODWILL</text>
    <text x="24" y="305" font-size="12" fill="#FFFFFF">Drives community engagement</text>
  </g>

  <!-- Stream 3: Priority Queue -->
  <g transform="translate(800, 160)">
    <rect width="340" height="320" rx="14" fill="#1F1F2A" stroke="#D9B9FF" stroke-width="2"/>
    <text x="24" y="50" font-size="13" font-weight="700" letter-spacing="4" fill="#D9B9FF">3 - PRIORITY SEATS</text>
    <text x="24" y="100" font-size="48" font-weight="900" fill="#FFFFFF">80%</text>
    <text x="100" y="100" font-size="14" fill="#9aa0aa">to host</text>
    <text x="24" y="120" font-size="14" fill="#9aa0aa">20% platform</text>
    <text x="24" y="170" font-size="13" fill="#FFFFFF" font-weight="700">Players pay to:</text>
    <text x="24" y="195" font-size="12" fill="#9aa0aa">- Skip waitlists</text>
    <text x="24" y="215" font-size="12" fill="#9aa0aa">- Reserve a seat early</text>
    <text x="24" y="235" font-size="12" fill="#9aa0aa">- Get rebuy on bust</text>
    <text x="24" y="255" font-size="12" fill="#9aa0aa">- VIP lobby placement</text>
    <text x="24" y="285" font-size="11" font-weight="700" letter-spacing="2" fill="#D9B9FF">PASSIVE INCOME</text>
    <text x="24" y="305" font-size="12" fill="#FFFFFF">Scales with tournament demand</text>
  </g>

  <text x="600" y="520" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="3" fill="#74C7B5">ALL PAYOUTS VIA PAYPAL - WEEKLY AUTOMATIC TRANSFER - FULL TRANSPARENCY DASHBOARD</text>
</svg>
